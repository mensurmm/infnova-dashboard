<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 90" width="100%" height="100%">
  <defs>
    <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E63300" />
      <stop offset="100%" stop-color="#FF5500" />
    </linearGradient>
    <linearGradient id="gradMid" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5500" />
      <stop offset="100%" stop-color="#FF8800" />
    </linearGradient>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8800" />
      <stop offset="100%" stop-color="#FFAE00" />
    </linearGradient>
  </defs>

  <!-- LOGO MARK -->
  <g transform="translate(5, 5)">
    <polygon points="8,70 8,26 30,10 30,54" fill="url(#gradDark)" />
    <polygon points="30,10 30,54 62,76 62,32" fill="url(#gradMid)" />
    <polygon points="62,32 108,6 86,60 62,76" fill="url(#gradLight)" />
    <line x1="62" y1="32" x2="62" y2="76" stroke="#CC2900" stroke-width="1.5" opacity="0.4" />
  </g>

  <!-- TYPOGRAPHY -->
  <text x="125" y="46" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="#FFFFFF" letter-spacing="3.5">
    INFNOVA
  </text>
  
  <!-- "TECHNOLOGIES" - Bolder, Brighter & Legible -->
  <text x="126" y="68" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="13" fill="#E2E8F0" letter-spacing="5">
    TECHNOLOGIES
  </text>
</svg>
